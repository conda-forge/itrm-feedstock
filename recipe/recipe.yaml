schema_version: 1

context:
  name: itrm
  version: "1.4.23"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/itrm-${{ version }}.tar.gz
  sha256: 0c31854290ddce271d43b1e45f49bb7bc395cde5b634e72a566f15e75247a95d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=45
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - numpy

tests:
  - python:
      imports:
        - itrm
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Interactive Terminal Utilities
  license: MIT
  license_file: LICENSE.txt
  homepage: https://gitlab.com/davidwoodburn/itrm

extra:
  recipe-maintainers:
    - thewchan
